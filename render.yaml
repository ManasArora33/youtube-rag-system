services:
  - type: web
    name: youtube-rag-python
    runtime: python
    version: "3.11"
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PINECONE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false
